services:
  # MySQL データベース
  database:
    image: mysql:8.0
    container_name: cooking-cost-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: cooking_cost_system
      MYSQL_USER: cooking_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
      - ./mysql-conf:/etc/mysql/conf.d:ro
    networks:
      - cooking-network
    secrets:
      - mysql_root_password
      - mysql_password
    healthcheck:
      # MYSQL_PWD 環境変数でパスワードを渡す
      # --password= 引数はプロセスリスト（ps aux / docker top）に平文で現れるため MYSQL_PWD の方が安全
      # MYSQL_PWD は非推奨だが、ヘルスチェックの一時的な環境変数としての使用は許容範囲
      test: ["CMD-SHELL", "MYSQL_PWD=$(cat /run/secrets/mysql_password) mysqladmin ping -h localhost -u cooking_user"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s  # 初回起動（スキーマ適用含む）が retries × interval を超えるのを防ぐ
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # バックエンド API（Gunicorn + Flask）
  # フロントエンドは Cloudflare Pages にデプロイするためここには含めない
  # DB 接続情報（DATABASE_URL_PRODUCTION）は .env.production 経由で渡すため
  # secrets から mysql_password を参照しない（secrets は DB コンテナ起動用のみ）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-cost-backend-prod
    restart: unless-stopped
    # ⚠️ env_file で読み込んだ環境変数は `docker inspect` で平文参照可能
    # Phase2 以降で Docker Secrets + entrypoint.sh による DATABASE_URL 構築に移行予定（issue #119）
    env_file:
      - ./backend/.env.production
    environment:
      PORT: 3001
      # GUNICORN_WORKERS: デフォルト 2（512MB 制限に適した値）
      # 推奨値: (2 × CPU コア数) + 1 — 必要に応じて上書き可能
      GUNICORN_WORKERS: 2
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"  # Caddy からのみアクセス可（外部に直接公開しない）
    networks:
      - cooking-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      # healthcheck.py でステータスコード検証・エラーハンドリングを一元管理
      test: ["CMD", "python3", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Gunicorn 起動 + DB 接続初期化に余裕を持たせる
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# file ベースのシークレット（Docker Compose 標準機能・Swarm 不要）
# database コンテナの初期化のみに使用。backend は .env.production 経由で接続するため参照しない。
secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt

# ボリューム
volumes:
  db_data_prod:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local

# ネットワーク
networks:
  cooking-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
