services:
  # MySQL データベース
  database:
    image: mysql:8.0
    container_name: cooking-cost-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: cooking_cost_system
      MYSQL_USER: cooking_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
      - ./mysql-conf:/etc/mysql/conf.d:ro
    networks:
      - cooking-network
    secrets:
      - mysql_root_password
      - mysql_password
    healthcheck:
      # MYSQL_PWD 環境変数でパスワードを渡す
      # --password= 引数はプロセスリスト（ps aux / docker top）に平文で現れるため MYSQL_PWD の方が安全
      # MYSQL_PWD は非推奨だが、ヘルスチェックの一時的な環境変数としての使用は許容範囲
      test: ["CMD-SHELL", "MYSQL_PWD=$(cat /run/secrets/mysql_password) mysqladmin ping -h localhost -u cooking_user"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s  # 初回起動（スキーマ適用含む）が retries × interval を超えるのを防ぐ
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # バックエンド API（Gunicorn + Flask）
  # フロントエンドは Cloudflare Pages にデプロイするためここには含めない
  # JWT_SECRET・SECRET_KEY・DBパスワードは Docker secrets 経由で渡し、
  # config_production.py が /run/secrets/* を直接読み込む（環境変数を経由しないため docker inspect で露出しない）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-cost-backend-prod
    restart: unless-stopped
    secrets:
      - mysql_password
      - jwt_secret
      - secret_key
    # env_file には FLASK_ENV・PORT・CORS_ORIGIN など非機密値のみを置く
    # （JWT_SECRET 等が残っていても config_production.py は secrets ファイルを優先するため安全だが、
    #   docker inspect での露出を避けるため新規生成時は記載しないこと）
    env_file:
      - ./backend/.env.production
    environment:
      # APP_ENV: app.py が config クラスの切り替えに使用する独自環境変数
      # （FLASK_ENV は Flask 3.0 で廃止されたため APP_ENV に移行済み）
      # environment: は env_file: より優先されるため、.env.production に同名キーがあっても
      # こちらの値で上書きされる（多重防衛として明示的に固定）
      APP_ENV: production
      # FLASK_DEBUG: Flask フレームワーク自体のデバッグモード制御。"0" が安全・標準的な無効値。
      # ProductionConfig.DEBUG=False で制御済みだが多重防衛として設定する。
      FLASK_DEBUG: "0"
      PORT: 3001
      # DB 接続パラメータ（非機密。パスワードのみ secrets 経由）
      DB_USER: cooking_user
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: cooking_cost_system
      # GUNICORN_WORKERS: デフォルト 2（512MB 制限に適した値）
      # 推奨値: (2 × CPU コア数) + 1 — 必要に応じて上書き可能
      GUNICORN_WORKERS: 2
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"  # Caddy からのみアクセス可（外部に直接公開しない）
    networks:
      - cooking-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      # healthcheck.py でステータスコード検証・エラーハンドリングを一元管理
      test: ["CMD", "python3", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Gunicorn 起動 + DB 接続初期化に余裕を持たせる
    # user: は Dockerfile の `USER appuser`（非 root）で制御済みのため docker-compose 側では省略
    security_opt:
      - no-new-privileges:true  # setuid バイナリ等による権限昇格を防止
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# file ベースのシークレット（Docker Compose 標準機能・Swarm 不要）
# mysql_root_password は database コンテナの初期化のみに使用。
# mysql_password・jwt_secret・secret_key は database 初期化と backend 双方から参照される。
# ⚠️ secrets/*.txt のパーミッションを 600 に設定すること（owner read-only）
#    例: chmod 600 secrets/*.txt
secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  secret_key:
    file: ./secrets/secret_key.txt

# ボリューム
volumes:
  db_data_prod:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local

# ネットワーク
networks:
  cooking-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
