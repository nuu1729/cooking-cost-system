name: Deploy to Cloudflare
# main への push は自動的に staging へデプロイする。
# production への反映は workflow_dispatch（手動実行）でのみ行う
# （Phase 7 のカットオーバー完了までは本番への自動デプロイを避けるための意図的な設計）。

on:
  push:
    branches: [main]
    paths:
      - 'cooking-cost-system/backend/**'
      - 'cooking-cost-system/worker/**'
      - 'cooking-cost-system/wrangler.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        type: choice
        options: [staging, production]
        default: staging

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cooking-cost-system/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      # bare `pytest` はカレントディレクトリを sys.path に追加しないため config.py 等の
      # トップレベルモジュールを import できない。`python -m pytest` を使うこと。
      - run: python -m pytest tests/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Workerの依存関係をインストール
        working-directory: cooking-cost-system/worker
        run: npm ci
      - name: D1マイグレーションを適用
        working-directory: cooking-cost-system/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 migrations apply DB --remote \
            --env "${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}" \
            --config ../wrangler.toml
      - name: Worker + Container をデプロイ
        working-directory: cooking-cost-system/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --env "${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}" \
            --config ../wrangler.toml
