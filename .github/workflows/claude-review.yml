name: Claude PR Review

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ラベル "claude-review" をつけたときに自動レビュー（agent mode）
  claude-review-label:
    if: github.event_name == 'pull_request' && github.event.label.name == 'claude-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            このPRをレビューしてください。以下の観点で確認し、日本語でコメントしてください。
            - バグや論理的な誤りがないか
            - セキュリティの問題（XSS・SQLインジェクション・認証不備など）がないか
            - コードの可読性・保守性に問題がないか
            - パフォーマンス上の懸念点がないか
            良い点も含めてフィードバックしてください。

  # PR コメントで "@claude" とメンションしたときに返答（tag mode）
  claude-review-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
