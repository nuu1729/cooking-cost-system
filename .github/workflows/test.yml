name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────
  # フロントエンド: lint・型チェック・ユニットテスト
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (lint / type-check / test)
    runs-on: ubuntu-latest
    # cooking-cost-system/ が npm workspace のルート（package-lock.json の場所）
    defaults:
      run:
        working-directory: cooking-cost-system

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cooking-cost-system/package-lock.json

      - name: 依存関係をインストール
        # workspace ルートで npm ci を実行し、全 workspace（frontend/backend）の依存を解決
        run: npm ci

      - name: ESLint
        run: npm run lint -w frontend

      - name: TypeScript 型チェック
        run: npm run type-check -w frontend

      - name: ユニットテスト
        # vitest はデフォルトでウォッチモードになるため --run で非インタラクティブ実行
        run: npm run test -w frontend -- --run

  # ─────────────────────────────────────────
  # バックエンド: pytest
  # test_cors_validation.py は config.py の関数のみをテストし DB 不要
  # pytest.ini の pythonpath = . により backend/ がモジュール探索パスに含まれる
  # ─────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cooking-cost-system/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cooking-cost-system/backend/requirements-dev.txt

      - name: 依存関係をインストール
        # requirements-dev.txt は requirements.txt の全依存を含む pip-compile 済みロックファイル
        run: pip install -r requirements-dev.txt

      - name: pytest
        run: pytest tests/ -v
